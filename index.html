<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Very Important Question 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #e8506a;
      --blush: #f9c4ce;
      --cream: #fff8f0;
      --gold: #d4a553;
      --deep: #3b1a2e;
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      overflow: hidden;
      font-family: 'Lora', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Soft gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, #fce4ec88 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, #f8bbd088 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, #fff0f488 0%, transparent 70%);
      z-index: 0;
    }

    /* Floating hearts background */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart-float {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) rotate(-10deg) scale(0.8); }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-110vh) rotate(10deg) scale(1.1); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(16px);
      border: 1.5px solid rgba(232,80,106,0.18);
      border-radius: 32px;
      padding: 56px 60px 52px;
      max-width: 520px;
      width: 90vw;
      text-align: center;
      box-shadow:
        0 8px 48px rgba(232,80,106,0.12),
        0 2px 8px rgba(232,80,106,0.06),
        inset 0 1px 0 rgba(255,255,255,0.9);
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .emoji-top {
      font-size: 3.2rem;
      display: block;
      margin-bottom: 12px;
      animation: heartbeat 1.6s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.18); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.12); }
      56%       { transform: scale(1); }
    }

    .question {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 5vw, 2.3rem);
      color: var(--deep);
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .sub {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 1rem;
      color: #c06080;
      margin-bottom: 44px;
      opacity: 0.85;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      min-height: 80px;
    }

    /* YES button */
    .btn-yes {
      background: linear-gradient(135deg, #e8506a 0%, #c0395a 100%);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(232,80,106,0.38);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      position: relative;
      z-index: 10;
      letter-spacing: 0.03em;
    }

    .btn-yes:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 28px rgba(232,80,106,0.5);
    }

    .btn-yes:active {
      transform: scale(0.97);
    }

    /* NO button */
    .btn-no {
      background: transparent;
      color: #b0748a;
      border: 1.5px solid #e8b4be;
      border-radius: 50px;
      padding: 12px 28px;
      font-family: 'Lora', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.2s;
      position: fixed;
      z-index: 20;
      white-space: nowrap;
    }

    .btn-no:hover {
      border-color: #e8506a;
      color: #e8506a;
    }

    /* Congratulations screen */
    .congrats {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: linear-gradient(135deg, #fff0f4, #ffe4ec, #fff8f0);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 32px;
      animation: fadeIn 0.6s ease both;
    }

    .congrats.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .congrats-emoji {
      font-size: 5rem;
      animation: popIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
      margin-bottom: 16px;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .congrats h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: var(--deep);
      margin-bottom: 16px;
      animation: slideUp 0.7s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .congrats p {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.35rem);
      color: #c06080;
      animation: slideUp 0.7s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      max-width: 400px;
      line-height: 1.7;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Confetti hearts */
    .confetti-heart {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      animation: confettiFall 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      z-index: 200;
    }

    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.5); }
    }
  </style>
</head>
<body>

  <!-- Floating hearts bg -->
  <div class="hearts-bg" id="heartsBg"></div>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <span class="emoji-top">💝</span>
    <h1 class="question">Sanby, do you love me?</h1>
    <p class="sub">Think carefully before you answer...</p>
    <div class="buttons" id="buttonsArea">
      <button class="btn-yes" id="btnYes" onclick="onYes()">Yes 💕</button>
    </div>
  </div>

  <!-- No button (placed outside card, moves freely) -->
  <button class="btn-no" id="btnNo" onclick="onNo()">No</button>

  <!-- Congratulations screen -->
  <div class="congrats" id="congrats">
    <div class="congrats-emoji">🥰</div>
    <h1>Congratulations!</h1>
    <p>You gave the right answer.<br>Love you for that! 💕</p>
  </div>

  <script>
    let noClicks = 0;
    let yesSize = 1;
    const btnYes = document.getElementById('btnYes');
    const btnNo  = document.getElementById('btnNo');

    // Position the No button initially near the Yes button
    function initNoBtn() {
      const card = document.getElementById('mainCard');
      const rect = card.getBoundingClientRect();
      btnNo.style.left = (rect.left + rect.width / 2 + 60) + 'px';
      btnNo.style.top  = (rect.top  + rect.height / 2 + 100) + 'px';
    }

    window.addEventListener('load', initNoBtn);
    window.addEventListener('resize', initNoBtn);

    function onNo() {
      noClicks++;

      // Grow the YES button
      yesSize += 0.22;
      btnYes.style.transform = `scale(${yesSize})`;
      btnYes.style.fontSize  = (1.15 * Math.min(yesSize, 2.5)) + 'rem';

      // Move the NO button to a random position, away from Yes button
      moveNoBtn();
    }

    function moveNoBtn() {
      const margin = 80;
      const bw = btnNo.offsetWidth  || 90;
      const bh = btnNo.offsetHeight || 44;
      const maxX = window.innerWidth  - bw - margin;
      const maxY = window.innerHeight - bh - margin;

      // Keep trying until it's far from Yes button
      let x, y, attempts = 0;
      const yesRect = btnYes.getBoundingClientRect();

      do {
        x = margin + Math.random() * maxX;
        y = margin + Math.random() * maxY;
        attempts++;
      } while (
        attempts < 20 &&
        Math.abs(x - yesRect.left) < 160 &&
        Math.abs(y - yesRect.top)  < 100
      );

      btnNo.style.transition = 'left 0.15s ease, top 0.15s ease';
      btnNo.style.left = x + 'px';
      btnNo.style.top  = y + 'px';
    }

    // Move No button away when mouse gets close
    btnNo.addEventListener('mousemove', function(e) {
      moveNoBtn();
    });

    // Touch support for No button on mobile
    btnNo.addEventListener('touchstart', function(e) {
      e.preventDefault();
      moveNoBtn();
    }, { passive: false });

    function onYes() {
      // Show congrats
      document.getElementById('congrats').classList.add('show');
      launchConfetti();
    }

    function launchConfetti() {
      const emojis = ['💕','💖','💗','💝','🌸','✨','💓','🌷','💞','🥰'];
      for (let i = 0; i < 40; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'confetti-heart';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.top  = '-40px';
          el.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
          el.style.animationDuration = (1.8 + Math.random() * 1.5) + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 3500);
        }, i * 60);
      }
    }

    // Generate floating hearts background
    const hb = document.getElementById('heartsBg');
    const floatEmojis = ['💗','💕','🌸','✨','💖','🌷'];
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('span');
      h.className = 'heart-float';
      h.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.animationDuration = (8 + Math.random() * 12) + 's';
      h.style.animationDelay    = (Math.random() * 12) + 's';
      h.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
      hb.appendChild(h);
    }
  </script>
</body>
</html>
